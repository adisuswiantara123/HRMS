{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - HRMS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="{% static 'css/modern.css' %}" />
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: var(--body-bg, #f5f7fa);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-container {
        width: 100%;
        max-width: 400px;
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="text-center mb-4">
        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px; font-size: 1.5rem;">
          <i class="fas fa-microchip"></i>
        </div>
        <h4 class="fw-bold">Welcome Back</h4>
        <p class="text-muted small">Please login to your account</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_username" class="form-label small fw-bold">Username</label>
          <input type="text" name="username" class="form-control rounded-pill px-3" id="id_username" required>
        </div>
        <div class="mb-4">
          <label for="id_password" class="form-label small fw-bold">Password</label>
          <input type="password" name="password" class="form-control rounded-pill px-3" id="id_password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill mb-3">Login</button>
        <input type="hidden" name="next" value="{{ next }}" />
      </form>
    </div>
  </body>
</html>
